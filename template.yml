# The 'id' should be a string that uniquely identifies your template
id: 'voronoi-treemap'
name: Voronoi Treemap
description: A hierarchical treemap diagram using Voronoi tessellation.
author: Luca Picci

# This template is compatible with SDK version 3
sdk_version: 3

build:
  # Defines the build processes used to build your template from source.
  # You can have any number of build processes, and changes to the relevant
  # files will trigger the appropriate build. Here we define build scripts
  # for JavaScript and CSS.

  src:
    script: npm run build
    # You can specify a whole directory, or individual files, or both.
    # A change inside the directory or to any of the listed files will
    # trigger a rebuild and reload.
    directory: src
    files:
      - rollup.config.js

  less:
    script: npm run less
    directory: less

settings:
  # Creates a settings panel that enables the end user to set the default state for
  # individual visualisations made with this template.
  #
  # Available types:
  # • "number" >> gives a number input. Optionally add "min:", "max:", and "step:" properties.
  # • "string" >> gives an text input
  # • "text" >> gives a textarea
  # • "boolean" >> gives a checkbox
  # • "color" >> gives a color picker

  - Voronoi Treemap
  - property: voronoi_settings.fill
    name: Voronoi Fill Color
    description: The fill color for the Voronoi polygons.
    type: color
  - property: voronoi_settings.border_color
    name: Border Color
    description: The fill color for the polygon borders.
    type: color
  - property: voronoi_settings.border_size
    name: Border Size
    description: The size of the polygon borders.
    type: number
  - property: voronoi_settings.clip_type
    name: Clipping Type
    description: The method used to clip the Voronoi polygons.
    type: string
    choices:
      - "rectangle"
      - "circle"
      - "triangle"
      - "diamond"
      - "pentagon"
      - "hexagon"
  - property: voronoi_settings.seed
    name: Random Seed
    description: The seed for the random number generator, which affects the layout of the Voronoi polygons.
    type: number
    min: 1
  - property: voronoi_settings.max_iterations
    name: Max Iterations
    description: The maximum number of iterations for the Voronoi layout algorithm. Higher values may produce better layouts but take longer to compute. The recommended value is 50
    type: number
    min: 1
    max: 100
  - property: voronoi_settings.convergence_ratio
    name: Convergence Ratio
    description: The ratio used to determine when the Voronoi layout algorithm has converged. A lower value may produce better layouts but take longer to compute. The recommended value is 0.001
    type: number
    min: 0.001
    max: 0.1
    step: 0.001



  - Section title # Headings can be used to break up the settings into collapsible sections
  - property: example_state_property # Refers to a property in the template's state object
    name: Example number setting # Display name for the settings panel
    description: A setting for changing a number # Optional description for the settings panel
    type: number # See available types above

  # imported modules
  - property: layout
    import: "@flourish/layout"


data:
  - key: firstLevel
    name: First level
    type: column
    dataset: data
    column: "Data::B"
    data_type:
      - string

  - key: secondLevel
    name: Second level
    type: column
    dataset: data
    column: "Data::A"
    data_type:
      - string
    optional: true

  - key: values
    name: Values
    type: column
    dataset: data
    column: "Data::C"
    data_type:
      - string


