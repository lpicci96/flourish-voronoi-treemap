# The 'id' should be a string that uniquely identifies your template
id: 'voronoi-treemap'
name: Voronoi Treemap
description: A hierarchical voronoi treemap.
author: Luca Picci

# This template is compatible with SDK version 3
sdk_version: 3

build:
  # Defines the build processes used to build your template from source.
  # You can have any number of build processes, and changes to the relevant
  # files will trigger the appropriate build. Here we define build scripts
  # for JavaScript and CSS.

  src:
    script: npm run build
    # You can specify a whole directory, or individual files, or both.
    # A change inside the directory or to any of the listed files will
    # trigger a rebuild and reload.
    directory: src
    files:
      - rollup.config.js

  less:
    script: npm run less
    directory: less

settings:
  # Creates a settings panel that enables the end user to set the default state for
  # individual visualisations made with this template.
  #
  # Available types:
  # • "number" >> gives a number input. Optionally add "min:", "max:", and "step:" properties.
  # • "string" >> gives an text input
  # • "text" >> gives a textarea
  # • "boolean" >> gives a checkbox
  # • "color" >> gives a color picker

  - Voronoi Treemap
  - property: voronoi_settings.chart_height
    name: Height mode
    description: "Controls the height of the chart area. <b>Auto</b> uses the default Flourish height. <b>Square</b> makes the chart as tall as it is wide. <b>Match clip</b> adjusts the height to fit the selected clipping shape with no wasted space. <b>Custom</b> lets you set a specific aspect ratio for desktop and mobile."
    type: string
    choices:
      - auto
      - square
      - match clip
      - custom
  - property: voronoi_settings.chart_aspect_ratio_desktop
    name: Aspect ratio (desktop)
    description: "Height as a proportion of width. E.g. 1 = square, 0.5 = half as tall as wide, 1.5 = 50% taller than wide."
    type: number
    min: 0.1
    max: 3
    step: 0.05
    width: half
    show_if:
      voronoi_settings.chart_height: custom
  - property: voronoi_settings.chart_aspect_ratio_mobile
    name: Aspect ratio (mobile)
    description: "Height as a proportion of width on mobile screens."
    type: number
    min: 0.1
    max: 3
    step: 0.05
    width: half
    show_if:
      voronoi_settings.chart_height: custom
  - property: voronoi_settings.chart_breakpoint
    name: Mobile breakpoint (px)
    description: "Screen width in pixels below which the mobile aspect ratio is used."
    type: number
    min: 200
    max: 1200
    step: 10
    width: half
    show_if:
      voronoi_settings.chart_height: custom

  - property: voronoi_settings.clip_type
    name: Clipping Type
    description: The method used to clip the Voronoi polygons. Available options are "rectangle" (takes up all available horizontal space), "square", "circle", "triangle", "rhombus", "pentagon", and "hexagon".
    type: string
    style: buttons
    choices:
      -
        - data:image/png;base64,
        - rectangle
      -
        - data:image/png;base64,
        - square
      -
        - data:image/png;base64,
        - circle
      -
        - data:image/png;base64,
        - triangle
      -
        - data:image/png;base64,
        - rhombus
      -
        - data:image/png;base64,
        - pentagon
      -
        - data:image/png;base64,
        - hexagon
  - property: voronoi_settings.alignment
    name: Alignment
    description: The alignment of the Voronoi polygons within the chart area. This setting is not available when the clip type is set to "rectangle" as it will take up the full width of the chart.
    type: string
    style: buttons
    width: half
    choices:
      - [ fa-align-left, left ]
      - [ fa-align-center, center ]
      - [ fa-align-right, right ]
    show_if:
      voronoi_settings.clip_type: [square, circle, triangle, pentagon, hexagon, rhombus]
      voronoi_settings.chart_height: [auto, custom]

  # cell gap settings
  - property: voronoi_settings.gap
    name: Cell gap
    description: Gap between cells as a percentage of chart size. Scales proportionally across screen sizes.
    type: number
    min: 0
    max: 0.5
    step: 0.05
    width: quarter
    new_section: Cell gaps
  - property: voronoi_settings.border_rounding_style
    name: Border rounding style
    description: Controls how cell corners are drawn. "straight" draws sharp corners, "adaptive rounding" smooths corners with quadratic Bézier curves that naturally adapt to each corner's geometry.
    type: string
    width: half
    choices:
      - straight
      - adaptive rounding
  - property: voronoi_settings.border_radius
    name: Border radius
    description: Rounding radius as a percentage of chart size. Scales proportionally across screen sizes.
    type: number
    min: 0
    max: 5
    step: 0.1
    width: quarter
    show_if:
      voronoi_settings.border_rounding_style: adaptive rounding
  - property: voronoi_settings.border_rounding_reach
    name: Rounding reach
    description: Maximum fraction of each edge that corner rounding can consume. Higher values allow rounder corners on short edges but reduce visible straight segments.
    type: number
    min: 0.05
    max: 0.5
    step: 0.05
    width: quarter
    show_if:
      voronoi_settings.border_rounding_style: adaptive rounding


#  Advanced settings
  - property: voronoi_settings.advanced_settings
    name: Advanced Settings
    description: Show advanced settings for the voronoi tesselation algorithm and layout.
    type: boolean
    new_section: Advanced
  - property: voronoi_settings.seed
    name: Random Seed
    description: The seed for the random number generator, which affects the layout of the Voronoi polygons.
    type: number
    min: 1
    show_if: voronoi_settings.advanced_settings
  - property: voronoi_settings.max_iterations
    name: Max Iterations
    description: The maximum number of iterations for the Voronoi layout algorithm. Higher values may produce better layouts but take longer to compute.
    type: number
    min: 10
    max: 300
    show_if: voronoi_settings.advanced_settings
  - property: voronoi_settings.convergence_ratio
    name: Convergence Ratio
    description: The ratio used to determine when the Voronoi layout algorithm has converged. A lower value may produce better layouts but take longer to compute.
    type: number
    min: 0.001
    max: 0.1
    step: 0.001
    show_if: voronoi_settings.advanced_settings
  - property: voronoi_settings.min_weight_ratio
    name: Min Weight Ratio
    description: Sets a minimum cell weight as a fraction of the largest cell. Small cells below this threshold are inflated to the minimum, which prevents tiny slivers but redistributes space away from larger cells. Set to 0 for pure proportional sizing. Values range from 0 to 0.05.
    type: number
    min: 0
    max: 0.05
    step: 0.005
    show_if: voronoi_settings.advanced_settings

  - Grid of charts
  - property: facets
    import: "@flourish/facets"
    show_if:
      data.data.facet: true

  - Labels
  - property: labels.show_labels
    name: Show labels
    description: Show labels for the Voronoi polygons.
    type: boolean
  - property: labels.hide_small_labels
    name: Hide small labels
    description: Hide labels that do not fit within their corresponding polygon. This setting is overridden if specific labels are selected to be shown.
    type: boolean
    show_if: labels.show_labels
    width: half
  - property: labels.hide_margin
    name: Margin
    description: The margin to apply when determining whether a label fits within its corresponding polygon.
    type: number
    min: 0
    max: 1
    step: 0.1
    show_if:
       labels.hide_small_labels: true
       labels.show_labels: true
  - property: labels.show_list
    name: Show specific labels
    description: Show only specific labels. List the labels to display (e.g. "China") one per line. This setting overrides the "Hide small labels" setting.
    type: code
    show_if: labels.show_labels
  - property: labels.wrap_labels
    name: Wrap labels
    description: Wrap labels that do not fit within their corresponding polygon.
    type: boolean
    show_if: labels.show_labels

#    styling
  - property: labels.size_proportionally
    name: Size labels proportionally
    description: Auto-size the labels based on the size of the polygons.
    type: boolean
    show_if: labels.show_labels
    new_section: Styling
  - property: labels.font_size
    name: Font size
    description: The font size of the labels.
    type: number
    step: 0.1
    min: 0.1
    show_if:
      labels.size_proportionally: false
      labels.show_labels: true
  - property: labels.min_font_size
    name: Min font size
    description: The minimum font size of the labels when sized proportionally to the polygons. Ensure that this value does not exceed the maximum font. If it does, the mid point of the font size range will be used for all labels to ensure rendering of the labels.
    type: number
    step: 0.1
    min: 0.1
    show_if:
      labels.size_proportionally: true
      labels.show_labels: true
  - property: labels.max_font_size
    name: Max font size
    description: The maximum font size of the labels when sized proportionally to the polygons. Ensure that this value is not less than the minimum font. If it does, the mid point of the font size range will be used for all labels to ensure rendering of the labels.
    type: number
    step: 0.1
    min: 0.1
    show_if:
      labels.size_proportionally: true
      labels.show_labels: true
  - property: labels.font_weight
    name: Font weight
    type: string
    show_if:
      labels.show_labels: true
    choices:
        - "normal"
        - "bold"
    width: half
  - property: labels.auto_contrast
    name: Auto contrast
    description: Automatically set label color to black or white based on the background color of each cell.
    type: boolean
    show_if: labels.show_labels
  - property: labels.font_color
    name: Font color
    type: color
    show_if:
      labels.show_labels: true
      labels.auto_contrast: false
  - property: labels.show_outline
    name: Show outline
    description: Show an outline around the labels, which can help to improve the readability of labels on top of similarly colored polygons.
    type: boolean
    show_if: labels.show_labels
  - property: labels.outline_color
    name: Outline color
    description: The color of the label outline, which can help to improve the readability of labels on top of similarly colored polygons.
    type: color
    show_if:
      labels.show_labels: true
      labels.show_outline: true
      labels.auto_contrast: false
  - property: labels.outline_size
    name: Outline size
    description: The size of the label outline, which can help to improve the readability of labels on top of similarly colored polygons (in em).
    type: number
    min: 0
    step: 0.1
    show_if:
      labels.show_labels: true
      labels.show_outline: true


  - property: labels.show_value_labels
    name: Show value labels
    description: Show the formatted data value below the category name label.
    type: boolean
    show_if: labels.show_labels
    width: full
    new_section: Value labels
  - property: labels.value_label_size
    name: Value label size
    description: Proportional size of the value label relative to the name label.
    type: number
    min: 0.3
    max: 1.5
    step: 0.05
    show_if:
      labels.show_value_labels: true
      labels.show_labels: true
    width: half
  - property: labels.value_label_opacity
    name: Value label opacity
    description: Opacity of the value label.
    type: number
    min: 0
    max: 1
    step: 0.05
    show_if:
      labels.show_value_labels: true
      labels.show_labels: true
    width: half
  - property: labels.value_label_weight
    name: Value label weight
    type: string
    show_if:
      labels.show_value_labels: true
      labels.show_labels: true
    choices:
        - "normal"
        - "bold"
    width: half


  - Colours
  - property: colors
    import: "@flourish/colors"
    overrides:
      - tag: numeric
        show_if: false
  - property: colors.jitter_shade
    name: Jitter shade
    description: Jitter the shade of the second level hierarchy. This only applies if a second level column is provided and a colour category column is not provided. Jittering the shade can help to distinguish each polygon in the level and add visual appeal to the chart, but it may also make the colours less consistent across the hierarchy.
    type: boolean
    new_section: Advanced
  - property: colors.jitter_amount
    name: Jitter amount
    description: The amount by which to jitter the shade of the second level hierarchy. The recommended value is 0.1
    type: number
    min: 0
    max: 0.5
    step: 0.05
    show_if: colors.jitter_shade

  - Legend
  - property: legend_container
    import: "@flourish/legend/container"
  - property: legend_categorical
    import: "@flourish/legend/discrete-color"

  - Popups & panels
  - property: popup
    import: "@flourish/info-popup"

  - Number formatting
  - property: localization
    import: "@flourish/number-localization"
  - property: number_format
    import: "@flourish/number-formatter"
    overrides:
      - property: suffix
        show_if:
          labels.adaptive_format: false
      - property: transform_labels
        show_if:
          number_format.advanced: true
          labels.adaptive_format: false

  - property: labels.adaptive_format
    name: Adaptive number formatting
    description: Automatically scale each value to the most appropriate magnitude suffix (K, M, B, T). When enabled, the suffix setting above is bypassed.
    type: boolean
    width: full
    show_if:
      number_format.advanced: true
    new_section: Adaptive number formatting
  - property: labels.adaptive_space
    name: Space before suffix
    description: Add a space between the number and the suffix.
    type: boolean
    width: full
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
  - property: labels.scale_trillions
    name: Trillions
    type: boolean
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
  - property: labels.scale_trillions_suffix
    name: Trillions suffix
    type: string
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
#      labels.scale_trillions: true
  - property: labels.scale_billions
    name: Billions
    type: boolean
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
  - property: labels.scale_billions_suffix
    name: Billions suffix
    type: string
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
#      labels.scale_billions: true
  - property: labels.scale_millions
    name: Millions
    type: boolean
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
  - property: labels.scale_millions_suffix
    name: Millions suffix
    type: string
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
#      labels.scale_millions: true
  - property: labels.scale_thousands
    name: Thousands
    type: boolean
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
  - property: labels.scale_thousands_suffix
    name: Thousands suffix
    type: string
    width: half
    show_if:
      number_format.advanced: true
      labels.adaptive_format: true
#      labels.scale_thousands: true

  # imported modules
  - property: layout
    import: "@flourish/layout"

  - Controls
  - property: controls_style
    import: "@flourish/ui-styles/controls-style"
  - property: dropdown_style
    import: "@flourish/ui-styles/dropdown-style"
  - property: button_style
    import: "@flourish/ui-styles/button-style"
  - property: slider_style
    import: "@flourish/ui-styles/slider-style"
  - property: controls_container
    import: "@flourish/controls/container"
  - property: filter
    import: "@flourish/controls"

  - Animations
  - property: animation_duration
    name: Animation Duration
    description: The duration of transitions in milliseconds. Setting this to 0 will disable animations.
    type: number
    min: 0
    step: 100


data:
  - key: firstLevel
    name: First level
    type: column
    dataset: data
    column: "Data::B"
    data_type:
      - string

  - key: secondLevel
    name: Second level
    type: column
    dataset: data
    column: "Data::A"
    data_type:
      - string
    optional: true

  - key: values
    name: Values
    type: column
    dataset: data
    column: "Data::C"
    data_type:
      - number

  - key: filter
    name: Filter
    type: column
    dataset: data
    data_type:
      - string
    optional: true

  - key: color_category
    name: Color category
    description: An optional string column that specifies the category by which to color the Voronoi polygons. If not provided, the first level of the hierarchy will be used for coloring.
    type: column
    dataset: data
    data_type:
      - string
    optional: true

  - key: facet
    name: Grid of charts
    type: column
    dataset: data
    data_type:
      - string
    optional: true

  - key: custom_tooltip
    name: Custom tooltip
    description: Custom tooltip content. This column can contain a number or string, including HTML. It will be displayed on the popup when hovering or in the panel when clicked. Recommended use is to include HTML string in combination with setting custom popups in the settings.
    type: column
    dataset: data
    data_type:
      - string
      - number
    optional: true

  - key: label_override
    name: Label override
    description: Optional column to override the label displayed on each cell. If not provided, the hierarchy level name is used.
    type: column
    dataset: data
    data_type:
      - string
    optional: true

  - key: value_label_override
    name: Value label override
    description: Optional column to override the value label displayed below the name label. If not provided, the formatted numeric value is used.
    type: column
    dataset: data
    data_type:
      - string
      - number
    optional: true


